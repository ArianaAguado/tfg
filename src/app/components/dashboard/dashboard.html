<div class="dashboard-wrapper">

  <aside class="sidebar">
    <div class="logo">Know Your <span class="neon">Game</span></div>

    <nav>

      <!-- ── SECCIÓN COMÚN ── -->

      <!-- ── SECCIÓN COMÚN ── -->
      <a routerLink="calendario" routerLinkActive="active">
        <i class="fa-solid fa-calendar"></i> Calendario
      </a>
      <a routerLink="biblioteca" routerLinkActive="active">
        <i class="fa-solid fa-gamepad"></i> Mi Biblioteca
      </a>
      <a routerLink="amigos" routerLinkActive="active" class="link-amigos">
        <i class="fa-solid fa-user-group"></i> Amigos
        <span class="badge-count" *ngIf="solicitudesAmistadCount > 0">{{
          solicitudesAmistadCount }}</span>
      </a>
      <a routerLink="soporte" routerLinkActive="active">
        <i class="fa-solid fa-headset"></i> Soporte
      </a>

      <!-- ── SECCIÓN DEV ── -->
      <ng-container *ngIf="rol === 'desarrollador'">
        <div class="nav-separator">
          <span class="nav-separator-label">Dev</span>
        </div>
        <a routerLink="proponer-juego" routerLinkActive="active">
          <i class="fa-solid fa-file-circle-plus"></i> Enviar Propuesta
        </a>
      </ng-container>

      <!-- ── SECCIÓN ADMIN ── -->
      <ng-container *ngIf="rol === 'admin'">
        <div class="nav-separator">
          <span class="nav-separator-label">Admin</span>
        </div>
        <div class="nav-separator">
          <span class="nav-separator-label">Admin</span>
        </div>
        <a routerLink="crear-juegos" routerLinkActive="active">
          <i class="fa-solid fa-shield"></i> Gestión Juegos
        </a>
        <a routerLink="peticiones" routerLinkActive="active" class="link-peticiones">
        <a routerLink="peticiones" routerLinkActive="active" class="link-peticiones">
          <i class="fa-solid fa-envelope-open-text"></i> Revisar Peticiones
          <span class="badge-count" *ngIf="peticionesCount > 0">{{
            peticionesCount }}</span>
        </a>
        <a routerLink="admin-soporte" routerLinkActive="active" class="link-soporte">
          <i class="fa-solid fa-ticket"></i> Bandeja Soporte
          <span class="badge-count" *ngIf="ticketsAbiertosCount > 0">{{
            ticketsAbiertosCount }}</span>
        </a>
      </ng-container>


    </nav>

    <div class="user-profile" *ngIf="usuario" routerLink="perfil">
      <div class="user-avatar">
        <img [src]="avatarSidebar" alt="Avatar" class="avatar-img" />
      </div>
      <div class="user-info">
        <span class="user-name">{{ usuario.displayName || 'Usuario' }}</span>
        <span class="user-email">{{ usuario.email }}</span>
      </div>
      <i class="fa-solid fa-chevron-right user-arrow"></i>
    </div>
  </aside>

  <main class="main-content">
    <app-notificaciones />
    <router-outlet></router-outlet>
  </main>

</div>
