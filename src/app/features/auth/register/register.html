<div class="register-wrapper">
  <div class="login_form_container">
    <div class="login_form">
      <h2>REGISTRO</h2>
      
      <div class="input_group">
        <input type="text" [(ngModel)]="userData.nombre" placeholder="Nombre">
      </div>

      <div class="input_group">
        <input type="email" [(ngModel)]="userData.email" placeholder="Email">
      </div>

      <div class="input_group">
        <input type="password" [(ngModel)]="userData.password" placeholder="Contraseña">
      </div>

      <button id="login_button" (click)="registrarUsuario()">
        CREAR CUENTA
      </button>

      <div class="login-link">
        ¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión aquí</a>
      </div>

      <div class="login-link">
        <a (click)="router.navigate(['/'])" style="cursor:pointer">Volver al inicio</a>
      </div>

    </div>    
  </div>
</div>
